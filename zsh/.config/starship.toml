# [оӮ¶](#1BA6FA)\
# $directory\
# [оӮ°](fg:#1BA6FA bg:#FBA300)\
# $git_branch\
# $git_status\
# [оӮ°](fg:#FBA300 bg:#69e228)\
# $nodejs\
# [оӮ°](fg:#69e228)\
# [

# ](bold fg:#69e228)\

format = """
$directory\
$git_branch\
$git_status\
$nodejs\
[>> ](bold fg:#7dcfff)\
"""

# [fill]
# symbol = ""
# style = ""

# Disable the blank line at the start of the prompt
add_newline = false

# You can also replace your username with a neat symbol like п„  to save some space
[username]
show_always = true
style_user = "bold bg:#69e228 fg:#292C3E"
style_root = "bold bg:#69e228 fg:#292C3E"
format = '[$user ]($style)'

[directory]
style = "bold fg:#e0af68"
format = "[$path ]($style bold)"
truncation_length = 10
truncation_symbol = "вҖҰ/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "рҹ“Ғ"
"Downloads" = "пҖҷ"
"music" = "пҖҒ"
"Pictures" = "пҖҫ"
"projects" = "пӮҚ"
"web" = "пҮү"
"wrk" = "пӮұ"
".hyprdots" = "пҖ“"
# Keep in mind that the order matters. For example:
# "Important Documents" = " пңҳп„Ә "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important пңҳ " = " пңҳп„Ә "

[c]
symbol = "оҳһ "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = "пҢҲ "
style = "bg:#06969A"
format = '[ $symbol $context ]($style) $path'

[git_branch]
symbol = "пҗҳ"
style = "bold fg:#9ece6a"
format = '[$symbol $branch ]($style)'

[git_status]
style = "bold fg:#9ece6a"
format = '[$all_status$ahead_behind ]($style)'

[golang]
symbol = "оҳ§ "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[haskell]
symbol = "оқ· "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = "оү– "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = "оңҳ"
style = "bold fg:#69e228"
format = '[$symbol ($version) ]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#33658A"
format = '[ вҷҘ $time ]($style)'
