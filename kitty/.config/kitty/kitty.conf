include tm-dk.conf

term xterm-kitty

background_opacity 0.75

confirm_os_window_close 0

font_family      Hack Nerd Font Regular
bold_font        auto
italic_font      auto
bold_italic_font auto
# symbol_map codepoints Hack Nerd Font Mono Regular
font_size 10.0
modify_font cell_height 120%
tab_bar_style	 powerline
tab_powerline_style	round
tab_bar_edge		top
tab_bar_margin_height	0.0 0.0
window_border_width 0.2pt
window_padding_width 20
# active_border_color #ff9e64
# inactive_border_color #ff9e64
inactive_text_alpha 1
allow_remote_control yes

enabled_layouts tall:bias=50;full_size=1;mirrored=false, fat:bias=90
map ctrl+. layout_action bias 50 62 70 80 90
map ctrl+, layout_action bias 90 80 70 62 50


# BEGIN_KITTY_THEME
# tm-dk
include current-theme.conf
# END_KITTY_THEME
