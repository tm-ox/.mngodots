## upstream: https://github.com/folke/tokyonight.nvim/raw/main/extras/kitty_tokyonight_storm.conf

background #242835
# foreground #c0caf5
foreground #929292
selection_background #364A82
selection_foreground #c0caf5
url_color #73daca
# cursor #ff9e64

# Tabs
active_tab_background #7aa2f7
active_tab_foreground #1f2335
inactive_tab_background #292e42
inactive_tab_foreground #545c7e
#tab_bar_background #1D202F

# Normal colors
# color0 - Dark Gray (Background)
color0 #1D202F
# color1 - Pink (Foreground)
color1 #f7768e
# color2 - Light Green (Comment)
color2 #9ece6a
# color3 - Light Orange (Keyword)
color3 #e0af68
# color4 - Light Blue (Statement)
color4 #7aa2f7
# color5 - Light Purple (Variable)
color5 #bb9af7
# color6 - Light Sky Blue (String)
color6 #7dcfff
# color7 - Light Gray (Constant)
color7 #a9b1d6

# Bright colors
# color8 - Dark Gray (Background - Bright)
color8 #414868
# color9 - Pink (Foreground - Bright)
color9 #f7768e
# color10 - Light Green (Comment - Bright)
color10 #9ece6a
# color11 - Light Orange (Keyword - Bright)
color11 #e0af68
# color12 - Light Blue (Statement - Bright)
color12 #7aa2f7
# color13 - Light Purple (Variable - Bright)
color13 #bb9af7
# color14 - Light Sky Blue (String - Bright)
color14 #7dcfff
# color15 - Light Gray (Constant - Bright)
color15 #c0caf5

# Extended colors
# color16 - Light Orange (Error)
color16 #ff9e64
# color17 - Red (Warning)
color17 #db4b4b
