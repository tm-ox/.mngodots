[[mgr.prepend_keymap]]
on = [".", "p"]
run = "cd ~/projects"
desc = "projects"

[[mgr.prepend_keymap]]
on = [".", "u"]
run = "cd ~/projects/wrk/up"
desc = "up"

[[mgr.prepend_keymap]]
on = [".", "g"]
run = "cd ~/projects/wrk/gt"
desc = "gt"

[[mgr.prepend_keymap]]
on = [".", "w"]
run = "cd ~/Documents/web"
desc = "web"

[[mgr.prepend_keymap]]
on = [".", "k"]
run = "cd ~/Documents/wrk"
desc = "wrk"

[[mgr.prepend_keymap]]
on = [".", "c"]
run = "cd ~/.config"
desc = "config"

[[mgr.prepend_keymap]]
on = [".", "d"]
run = "cd ~/.hyprdots"
desc = "hyprdots"

[[mgr.prepend_keymap]]
on = [".", "z"]
run = "cd ~/projects/ziq"
desc = "ziq"

[[mgr.prepend_keymap]]
on = [".", "r"]
run = "cd ~/repos"
desc = "repos"

[[mgr.prepend_keymap]]
on = [".", "s"]
run = "cd ~/projects/snd"
desc = "ziq"

[[mgr.prepend_keymap]]
on = [".", "t"]
run = "cd ~/.local/share/Trash/files"
desc = "trash"

[[mgr.prepend_keymap]]
on = ["T"]
run = "plugin max-preview"
desc = "Maximize or restore preview"

[[mgr.prepend_keymap]]
on = ["<C-n>"]
run = '''
    shell 'ripdrag -W 800 -H 600 -s 48 -a "$@" -x 2>/dev/null &' --confirm
'''

[[mgr.prepend_keymap]]
on = "<C-h>"
run = "hidden toggle"

[[mgr.prepend_keymap]]
on = ["c", "a"]
run = "plugin compress"
desc = "Archive selected files"

[[mgr.prepend_keymap]]
on = "!"
run = 'shell "$SHELL" --block --confirm'
desc = "Open shell here"
