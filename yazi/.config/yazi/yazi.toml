[opener]
# edit = [{ run = 'kitty --detach vim "$@" > /dev/null 2>&1', orphan = true, desc = "vim" }]
edit = [{ run = 'kitty vim "$@"', orphan = true, desc = "vim" }]
rename = [{ run = 'kitty vim "$@"', block = true, desc = "rename" }]
# edit = [{ run = 'kitty vim "$@"', block = true, desc = "vim" }]
zed = [{ run = 'zeditor "$@"', block = true }]
vector = [{ run = 'inkscape "$@"', orphan = true }]
raster = [{ run = 'krita "$@"', orphan = true }]
snip = [{ run = 'satty -f "$@"', orphan = true }]
browser = [{ run = 'vivaldi "$@"', orphan = true }]
viewer = [{ run = 'evince "$@"', orphan = true }]
play = [{ run = 'mpv "$@"', orphan = true, for = "unix" }]
open = [{ run = 'xdg-open "$@"', desc = "Open" }]
zed_dir = [{ run = 'zeditor "$@"', orphan = true, desc = "Open directory with Zed" }]
bitwig = [{ run = 'bitwig-studio "$@"', orphan = true }]
aff = [{ run = 'Affinity "$@"', orphan = true }]
extract = [{ run = '7z x "$1" -o"$(dirname "$1")"', block = true, desc = "Extract archive" }]

[open]
editor = "edit"
prepend_rules = [
    { mime = "text/plain", use = [
        "edit",
    ] },
    { mime = "inode/directory", use = [
        "zed_dir",
    ] },
    { url = "*.svg", use = [
        "edit",
        "vector",
    ] },
    { url = "*.png", use = [
        "raster",
        "snip",
    ] },
    { url = "*.jpg", use = [
        "raster",
        "snip",
    ] },
    { url = "*.jpeg", use = [
        "raster",
        "snip",
    ] },
    { url = "*.pdf", use = [
        "viewer",
        "browser",
        "vector",
    ] },
    { url = "*.html", use = [
        "browser",
    ] },
    { url = "*.bwproject", use = [
        "bitwig",
    ] },
    { url = "*.af", use = [
        "aff",
    ] },
    { mime = "application/zip", use = ["extract"] },
    { mime = "application/x-tar", use = ["extract"] },
    { mime = "application/x-bzip2", use = ["extract"] },
    { mime = "application/x-gzip", use = ["extract"] },
    { mime = "application/x-xz", use = ["extract"] },
    { mime = "application/x-7z-compressed", use = ["extract"] },
    { mime = "application/x-rar", use = ["extract"] },
    { url = "*", use = [
        "rename",
        "zed",
    ] },
]
append_rules = []

[mgr]
linemode = "size_and_mtime"
